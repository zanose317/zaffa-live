<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAFFA LIVE TEST</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a1a; color: white; padding: 20px; text-align: center; }
        button { background: #ffb347; color: #1a1a2e; border: none; padding: 12px 24px; border-radius: 30px; font-size: 1rem; cursor: pointer; margin: 10px; }
        .result { margin-top: 20px; padding: 15px; background: #1e1e2f; border-radius: 15px; }
    </style>
</head>
<body>
<h1>ZAFFA LIVE - TEST</h1>
<button onclick="test1()">Test 1: JS Works?</button>
<button onclick="test2()">Test 2: Load supabase-js?</button>
<button onclick="test3()">Test 3: Load supabaseClient?</button>
<button onclick="test4()">Test 4: Connect to Railway?</button>
<button onclick="goToApp()">Go to Real App</button>
<div class="result" id="result"></div>

<script src="supabase-js.js"></script>
<script src="supabaseClient.js"></script>
<script src="lang.js"></script>
<script>
document.getElementById('result').innerText = 'JS Loaded OK! Ready for tests.';

function test1() {
  document.getElementById('result').innerHTML = '<b style="color:#4f4">Test 1 PASSED!</b> JavaScript works.';
}

function test2() {
  if (typeof window.supabase !== 'undefined') {
    document.getElementById('result').innerHTML = '<b style="color:#4f4">Test 2 PASSED!</b> supabase-js loaded. createClient: ' + (typeof window.supabase.createClient);
  } else {
    document.getElementById('result').innerHTML = '<b style="color:#f44">Test 2 FAILED!</b> window.supabase is undefined.';
  }
}

function test3() {
  if (typeof supabaseClient !== 'undefined') {
    document.getElementById('result').innerHTML = '<b style="color:#4f4">Test 3 PASSED!</b> supabaseClient loaded.';
    test4();
  } else {
    document.getElementById('result').innerHTML = '<b style="color:#f44">Test 3 FAILED!</b> supabaseClient is undefined.';
  }
}

function test4() {
  document.getElementById('result').innerHTML = 'Testing Railway connection...';
  fetch(API_BASE + '/health', { method: 'GET' }).then(function(r) {
    return r.text();
  }).then(function(t) {
    if (t === 'OK') {
      document.getElementById('result').innerHTML = '<b style="color:#4f4">Test 4 PASSED!</b> Railway connected! API_BASE = ' + API_BASE;
    } else {
      document.getElementById('result').innerHTML = '<b style="color:#f44">Test 4 FAILED!</b> Response: ' + t;
    }
  }).catch(function(e) {
    document.getElementById('result').innerHTML = '<b style="color:#f44">Test 4 FAILED!</b> Error: ' + e.message + '<br>API_BASE = ' + API_BASE;
  });
}

function goToApp() {
  window.location.href = 'index.html';
}
</script>
</body>
</html>
