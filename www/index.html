<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAFFA LIVE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(145deg, #0b0b2b, #1a1a3a); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); padding: 40px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 50px; font-size: 1rem; }
        input { background: #f0f0f0; text-align: center; }
        button { background: #ffb347; color: #1a1a2e; font-weight: bold; cursor: pointer; }
        .toggle { margin-top: 15px; font-size: 0.8rem; cursor: pointer; color: #ddd; }
        .error { color: #ff6b6b; margin-top: 10px; }
        #lang-btn { position:fixed;top:10px;right:10px;z-index:999;width:auto;padding:5px 15px;font-size:0.7rem;background:#333;color:#fff;border-radius:20px;border:1px solid #555; }
    </style>
</head>
<body>
<button onclick="toggleLang()" id="lang-btn"></button>
<div class="card">
    <h2>✨ ZAFFA LIVE ✨</h2>
    <h3 id="form-title"></h3>
    <input type="email" id="email" placeholder="">
    <input type="password" id="password" placeholder="">
    <button id="submit-btn"></button>
    <div class="toggle" id="toggle-link"></div>
    <div class="error" id="error-msg"></div>
</div>

<script src="supabase-js.js"></script>
<script src="supabaseClient.js"></script>
<script src="lang.js"></script>
<script>
(function() {
  var isLogin = true;
  var formTitle = document.getElementById('form-title');
  var submitBtn = document.getElementById('submit-btn');
  var toggleLink = document.getElementById('toggle-link');
  var errorMsg = document.getElementById('error-msg');
  var emailInput = document.getElementById('email');
  var passwordInput = document.getElementById('password');
  var langBtn = document.getElementById('lang-btn');

  function setTexts() {
    langBtn.textContent = t ? t('switchLang') : 'English';
    formTitle.textContent = isLogin ? (t ? t('loginTitle') : 'تسجيل الدخول') : (t ? t('signupTitle') : 'إنشاء حساب جديد');
    emailInput.placeholder = t ? t('email') : 'البريد الإلكتروني';
    passwordInput.placeholder = t ? t('password') : 'كلمة المرور';
    submitBtn.textContent = isLogin ? (t ? t('loginBtn') : 'دخول') : (t ? t('signupBtn') : 'تسجيل');
    toggleLink.textContent = isLogin ? (t ? t('noAccount') : 'ليس لديك حساب؟ سجل الآن') : (t ? t('hasAccount') : 'لديك حساب؟ سجل دخول');
  }
  setTexts();

  function showError(msg) { errorMsg.innerText = msg; setTimeout(function() { errorMsg.innerText = ''; }, 3000); }

  submitBtn.onclick = function() {
    var email = emailInput.value.trim();
    var password = passwordInput.value.trim();
    if (!email || !password) { showError(t ? t('fillFields') : 'املأ الحقول'); return; }

    if (isLogin) {
      supabaseClient.auth.signInWithPassword({ email: email, password: password }).then(function(result) {
        if (result.error) { showError(result.error.message); return; }
        fetch(API_BASE + '/api/get-profile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: result.data.user.id })
        }).then(function(r) { return r.json(); }).then(function(profileData) {
          if (profileData.error) { showError(profileData.error); return; }
          localStorage.setItem('current_user', JSON.stringify(profileData.profile));
          var role = profileData.profile.role;
          if (role === 'admin') location.href = 'admin-dashboard.html';
          else if (role === 'recharge_agent') location.href = 'agent-recharge.html';
          else if (role === 'host_agent') location.href = 'agent-host.html';
          else if (role === 'host') location.href = 'host-dashboard.html';
          else location.href = 'user-dashboard.html';
        }).catch(function(e) { showError('Connection error'); });
      });
    } else {
      fetch(API_BASE + '/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password })
      }).then(function(r) { return r.json(); }).then(function(data) {
        if (data.error) { showError(data.error); return; }
        alert(t ? t('created') : 'تم إنشاء الحساب، سجل دخول الآن');
        isLogin = true;
        setTexts();
      }).catch(function(e) { showError('Connection error'); });
    }
  };

  toggleLink.onclick = function() {
    isLogin = !isLogin;
    setTexts();
  };
})();
</script>
</body>
</html>
