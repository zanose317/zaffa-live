<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>وكيل المضيفين - ZAFFA LIVE</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0e0e1a; color: #eee; padding: 20px; direction: rtl; }
        .container { max-width: 1000px; margin: auto; background: #1e1e2f; border-radius: 30px; padding: 20px; }
        button { background: #ffb347; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; margin: 5px; }
        .logout { background: #dc3545; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 8px; border-bottom: 1px solid #444; text-align: center; }
    </style>
<script src="lang.js"></script>
</head>
<body><button onclick="toggleLang()" style="position:fixed;top:10px;right:10px;z-index:999;width:auto;padding:5px 15px;font-size:0.7rem;background:#333;color:#fff;border-radius:20px;border:1px solid #555;" id="lang-btn"></button>
<div class="container">
    <h2>🤝 وكيل المضيفين - ZAFFA LIVE</h2>
    <button class="logout" id="logout">تسجيل خروج</button>
    <div class="section">
        <h3>📋 وكالتي</h3>
        <div id="agency-info"></div>
        <h3>👥 المضيفون التابعون</h3>
        <table id="hosts-table"><thead><tr><th>اسم المضيف</th><th>الماس المجمع</th><th>عمولتي</th></tr></thead><tbody></tbody></table>
    </div>
</div>

<script src="supabase-js.js"></script>
<script src="supabaseClient.js"></script>
<script type="module">
    var supabase = window.supabaseClient; var API_BASE = window.API_BASE

    async function db(action, table, match, data, opts = {}) {
        const res = await fetch(API_BASE + '/api/admin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, table, match, data, ...opts })
        })
        return res.json()
    }

    let currentAgent = JSON.parse(localStorage.getItem('current_user'))
    if (!currentAgent || currentAgent.role !== 'host_agent') window.location.href = 'index.html'

    async function loadAgency() {
        const { data: agency } = await db('select', 'host_agencies', { agent_id: currentAgent.id }, '*', { single: true })
        if (!agency) {
            document.getElementById('agency-info').innerHTML = '<p>ليس لديك وكالة بعد. تواصل مع الأدمن لإنشاء وكالة لك.</p>'
            return
        }
        document.getElementById('agency-info').innerHTML = `<p>اسم الوكالة: ${agency.agency_name} | نسبة العمولة: ${agency.commission_percent}%</p>`
        const { data: agencyHosts } = await db('select', 'agency_hosts', { agency_id: agency.id }, 'host_id')
        const hostIds = (agencyHosts || []).map(h => h.host_id)
        if (hostIds.length === 0) {
            document.querySelector('#hosts-table tbody').innerHTML = '<tr><td colspan="3">لا يوجد مضيفون بعد</td></tr>'
            return
        }
        const { data: users } = await db('select', 'users', null, 'id, username, diamonds')
        const hosts = (users || []).filter(u => hostIds.includes(u.id))
        const tbody = document.querySelector('#hosts-table tbody')
        tbody.innerHTML = ''
        for (const host of hosts) {
            const row = tbody.insertRow()
            row.insertCell(0).innerText = host.username
            row.insertCell(1).innerText = host.diamonds
            row.insertCell(2).innerText = `(تحتسب تلقائياً مع كل هدية)`
        }
    }

    document.getElementById('logout').onclick = async () => { await supabase.auth.signOut(); localStorage.clear(); window.location.href = 'index.html' }
    loadAgency()
</script>
</body>
</html>
