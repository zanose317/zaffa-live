<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة المضيف - ZAFFA LIVE</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0e0e1a; color: #eee; padding: 20px; direction: rtl; }
        .container { max-width: 800px; margin: auto; background: #1e1e2f; border-radius: 30px; padding: 20px; }
        .user-info { background: #2d2d44; padding: 15px; border-radius: 20px; margin-bottom: 20px; text-align: center; }
        button { background: #ffb347; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; margin: 5px; }
        .logout { background: #dc3545; color: white; }
        .section { margin-top: 30px; border-top: 1px solid #444; padding-top: 20px; }
    </style>
<script src="lang.js"></script>
</head>
<body><button onclick="toggleLang()" style="position:fixed;top:10px;right:10px;z-index:999;width:auto;padding:5px 15px;font-size:0.7rem;background:#333;color:#fff;border-radius:20px;border:1px solid #555;" id="lang-btn"></button>
<div class="container">
    <h2>🎙️ لوحة المضيف - ZAFFA LIVE</h2>
    <div class="user-info" id="host-info"></div>
    <button class="logout" id="logout">تسجيل خروج</button>
    <div class="section">
        <h3>💎 تحويل الماس إلى فلوس</h3>
        <p>رصيد الماس الحالي: <strong id="diamonds-amount">0</strong></p>
        <input type="number" id="withdraw-amount" placeholder="كم ماس تريد سحبه؟">
        <button id="request-withdraw">تقديم طلب سحب</button>
        <p id="withdraw-result"></p>
    </div>
    <div class="section">
        <h3>📊 إحصائياتي</h3>
        <div id="host-stats"></div>
    </div>
</div>

<script src="supabase-js.js"></script>
<script src="supabaseClient.js"></script>
<script type="module">
    var supabase = window.supabaseClient; var API_BASE = window.API_BASE

    async function db(action, table, match, data, opts = {}) {
        const res = await fetch(API_BASE + '/api/admin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, table, match, data, ...opts })
        })
        return res.json()
    }

    let currentHost = JSON.parse(localStorage.getItem('current_user'))
    if (!currentHost || currentHost.role !== 'host') window.location.href = 'index.html'

    async function updateUI() {
        const result = await db('select', 'users', { id: currentHost.id }, '*', { single: true })
        if (result.data) currentHost = result.data
        document.getElementById('host-info').innerHTML = `
            <p>👤 ${currentHost.username}</p>
            <p>💎 الماس: ${currentHost.diamonds}</p>
            <p>⭐ VIP ${currentHost.vip_level || 1}</p>
        `
        document.getElementById('diamonds-amount').innerText = currentHost.diamonds
        localStorage.setItem('current_user', JSON.stringify(currentHost))
    }

    document.getElementById('request-withdraw').onclick = async () => {
        const amount = parseInt(document.getElementById('withdraw-amount').value)
        if (isNaN(amount) || amount <= 0 || amount > currentHost.diamonds) {
            document.getElementById('withdraw-result').innerText = 'مبلغ غير صحيح'
            return
        }
        const usd = amount / 100
        await db('insert', 'withdrawals', null, { user_id: currentHost.id, amount_diamonds: amount, amount_usd: usd })
        alert(`تم تقديم طلب سحب ${amount} ماس (${usd} دولار). سيتم مراجعته من قبل الأدمن.`)
        document.getElementById('withdraw-result').innerText = 'تم إرسال الطلب'
    }

    async function loadStats() {
        const result = await db('select', 'transactions', { to_user: currentHost.id }, 'amount')
        const gifts = result.data || []
        const totalGifts = gifts.reduce((a, b) => a + b.amount, 0)
        document.getElementById('host-stats').innerHTML = `<p>إجمالي الهدايا المستلمة: ${totalGifts} ماس</p>`
    }

    document.getElementById('logout').onclick = async () => { await supabase.auth.signOut(); localStorage.clear(); window.location.href = 'index.html' }
    updateUI()
    loadStats()
</script>
</body>
</html>
