<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>بروفايلي - ZAFFA LIVE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a1a; color: #eee; padding: 20px; direction: rtl; }
        .container { max-width: 450px; margin: auto; background: rgba(30,30,47,0.9); border-radius: 40px; padding: 25px; backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .avatar-section { display: flex; justify-content: center; margin-bottom: 20px; position: relative; }
        .avatar-wrapper { width: 120px; height: 120px; border-radius: 50%; background: #2a2a3c; display: flex; align-items: center; justify-content: center; position: relative; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid transparent; }
        .vip-frame { position: absolute; top: -8px; left: -8px; width: 136px; height: 136px; border-radius: 50%; pointer-events: none; border: 4px solid #aaa; }
        .edit-icon { position: absolute; bottom: 5px; right: 5px; background: #ffb347; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #fff; font-size: 18px; color: #000; }
        .stats-row { display: flex; justify-content: space-around; text-align: center; background: #2a2a3c; padding: 15px; border-radius: 30px; margin-bottom: 20px; }
        .stat-item { flex: 1; }
        .stat-number { font-size: 1.5rem; font-weight: bold; color: #ffb347; }
        .stat-label { font-size: 0.7rem; color: #aaa; }
        .balance-row { display: flex; justify-content: space-between; background: #1e1e2e; padding: 12px 20px; border-radius: 30px; margin-bottom: 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .menu-btn { background: #2a2a3c; padding: 12px 8px; text-align: center; border-radius: 30px; cursor: pointer; font-size: 0.85rem; }
        .menu-btn:active { background: #ffb347; color: #000; }
        .logout-btn { background: #dc3545; padding: 10px; border-radius: 30px; text-align: center; margin-top: 20px; cursor: pointer; }
        #lang-btn { position:fixed;top:10px;right:10px;z-index:999;padding:5px 15px;font-size:0.7rem;background:#333;color:#fff;border-radius:20px;border:1px solid #555; }
    </style>
</head>
<body>
<button onclick="toggleLang()" id="lang-btn"></button>
<div class="container">
    <div class="avatar-section">
        <div class="avatar-wrapper">
            <img id="avatar-img" class="avatar-img" src="https://via.placeholder.com/120?text=User">
            <div id="vip-frame" class="vip-frame"></div>
            <div class="edit-icon" id="edit-avatar">✏️</div>
        </div>
    </div>
    <div style="text-align:center;margin-bottom:15px;">
        <h3 id="username-display">---</h3>
        <p style="color:#ffb347;">VIP <span id="vip-level">0</span></p>
    </div>
    <div class="stats-row">
        <div class="stat-item"><div class="stat-number" id="visits">0</div><div class="stat-label">زائرين</div></div>
        <div class="stat-item"><div class="stat-number" id="gifts-received">0</div><div class="stat-label">هدايا</div></div>
        <div class="stat-item"><div class="stat-number" id="following">0</div><div class="stat-label">متابعة</div></div>
        <div class="stat-item"><div class="stat-number" id="followers">0</div><div class="stat-label">متابعون</div></div>
    </div>
    <div class="balance-row">
        <div>💎 ماس: <span id="diamonds">0</span></div>
        <div>🪙 عملات: <span id="points-coins">0</span></div>
    </div>
    <div class="menu-grid">
        <div class="menu-btn">🎒 حقيبة</div>
        <div class="menu-btn">📋 مهمة</div>
        <div class="menu-btn">🛒 محل</div>
        <div class="menu-btn">⭐ مستواي</div>
        <div class="menu-btn">🤝 وكاليني</div>
        <div class="menu-btn">💰 دخلي</div>
        <div class="menu-btn">👤 أنا</div>
        <div class="menu-btn">📡 ليف</div>
        <div class="menu-btn">🎉 حفلة</div>
    </div>
    <div class="logout-btn" id="logout">تسجيل خروج</div>
</div>

<script src="supabase-js.js"></script>
<script src="supabaseClient.js"></script>
<script src="lang.js"></script>
<script>
(function() {
  var user = JSON.parse(localStorage.getItem('current_user'));
  if (!user) { location.href = 'index.html'; return; }

  document.getElementById('lang-btn').textContent = typeof t === 'function' ? t('switchLang') : 'English';

  function loadProfile() {
    fetch(API_BASE + '/api/get-profile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: user.id })
    }).then(function(r) { return r.json(); }).then(function(data) {
      if (!data.profile) return;
      user = data.profile;
      localStorage.setItem('current_user', JSON.stringify(user));

      document.getElementById('username-display').textContent = user.username;
      document.getElementById('vip-level').textContent = user.vip_level || 1;
      document.getElementById('diamonds').textContent = user.diamonds || 0;
      document.getElementById('points-coins').textContent = user.points_coins || user.coins || 0;
      document.getElementById('visits').textContent = user.profile_visits || 0;
      document.getElementById('gifts-received').textContent = user.total_gifts_received || 0;
      document.getElementById('following').textContent = user.total_following || 0;
      document.getElementById('followers').textContent = user.total_followers || 0;

      if (user.avatar_url) {
        document.getElementById('avatar-img').src = user.avatar_url;
      }

      // Load VIP frame
      fetch(API_BASE + '/api/admin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'select', table: 'vip_frames', match: { vip_level: user.vip_level || 1 }, single: true })
      }).then(function(r) { return r.json(); }).then(function(fd) {
        if (fd.data) {
          var frame = document.getElementById('vip-frame');
          frame.style.borderColor = fd.data.frame_color;
        }
      }).catch(function(){});
    });
  }

  document.getElementById('edit-avatar').onclick = function() {
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = function(e) {
      var file = e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(ev) {
        document.getElementById('avatar-img').src = ev.target.result;
        // Upload via server API
        var formData = new FormData();
        formData.append('avatar', file);
        formData.append('userId', user.id);
        fetch(API_BASE + '/api/upload-avatar', { method: 'POST', body: formData }).then(function(r) { return r.json(); }).then(function(d) {
          if (d.url) {
            user.avatar_url = d.url;
            localStorage.setItem('current_user', JSON.stringify(user));
          }
        });
      };
      reader.readAsDataURL(file);
    };
    input.click();
  };

  document.getElementById('logout').onclick = function() {
    supabaseClient.auth.signOut().then(function() {
      localStorage.clear();
      location.href = 'index.html';
    });
  };

  // Menu buttons
  var menuBtns = document.querySelectorAll('.menu-btn');
  menuBtns.forEach(function(btn) {
    btn.onclick = function() {
      var role = user.role;
      if (btn.textContent.indexOf('حقيبة') >= 0 || btn.textContent.indexOf('Bag') >= 0) alert('قيد التطوير');
      else if (btn.textContent.indexOf('مهمة') >= 0) alert('قيد التطوير');
      else if (btn.textContent.indexOf('محل') >= 0) alert('قيد التطوير');
      else if (btn.textContent.indexOf('مستواي') >= 0) alert('VIP ' + (user.vip_level || 1));
      else if (btn.textContent.indexOf('وكاليني') >= 0) location.href = 'agent-host.html';
      else if (btn.textContent.indexOf('دخلي') >= 0) alert('إجمالي الماس: ' + (user.diamonds || 0));
      else if (btn.textContent.indexOf('أنا') >= 0) alert(user.username);
      else if (btn.textContent.indexOf('ليف') >= 0) alert('قيد التطوير');
      else if (btn.textContent.indexOf('حفلة') >= 0) alert('قيد التطوير');
    };
  });

  loadProfile();
})();
</script>
</body>
</html>
