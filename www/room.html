<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>غرفة صوتية - ZAFFA LIVE</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0e0e1a; color: white; text-align: center; padding: 20px; }
        button { background: #ffb347; border: none; padding: 10px 20px; border-radius: 30px; margin: 10px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>
<h2>🎙️ الغرفة الصوتية الرئيسية</h2>
<button id="join-mic">🎤 تشغيل المايك</button>
<button id="stop-mic">🔇 إيقاف المايك</button>
<p id="status"></p>
<button id="back">رجوع</button>

<script>
    let localStream = null
    const joinBtn = document.getElementById('join-mic')
    const stopBtn = document.getElementById('stop-mic')
    const statusP = document.getElementById('status')
    const backBtn = document.getElementById('back')

    joinBtn.onclick = async () => {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true })
            const audio = new Audio()
            audio.srcObject = localStream
            audio.play()
            statusP.innerText = '✅ المايك شغال، يمكنك التحدث الآن'
        } catch (err) {
            statusP.innerText = '❌ لا يمكن الوصول إلى المايك'
        }
    }
    stopBtn.onclick = () => {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop())
            localStream = null
            statusP.innerText = '🔇 تم إيقاف المايك'
        }
    }
    backBtn.onclick = () => {
        const user = JSON.parse(localStorage.getItem('current_user'))
        if (user?.role === 'user') window.location.href = 'user-dashboard.html'
        else if (user?.role === 'admin') window.location.href = 'admin-dashboard.html'
        else window.location.href = 'index.html'
    }
</script>
</body>
</html>
